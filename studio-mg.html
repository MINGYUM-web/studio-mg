<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1D9E75" />
<title>Studio MG</title>
<style>
  :root {
    --green:#1D9E75;--green-dark:#0F6E56;--green-bg:#E1F5EE;
    --red:#E24B4A;--red-dark:#A32D2D;--red-bg:#FCEBEB;
    --purple:#534AB7;
    --bg:#F2F2F7;--surface:#FFFFFF;
    --border:#DEDEDE;--border-light:#F0F0F0;
    --t1:#111111;--t2:#444444;--t3:#888888;
    --r-sm:8px;--r-md:12px;--r-lg:16px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--font);background:var(--bg);min-height:100vh;}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);}
  .screen{display:none;flex-direction:column;min-height:100vh;}
  .screen.active{display:flex;}
  .top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
  .top-bar h2{font-size:17px;font-weight:700;color:var(--t1);}
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;font-size:22px;color:var(--t1);line-height:1;display:flex;align-items:center;}
  .ml-auto{margin-left:auto;}
  #screen-login{padding:0 24px 40px;justify-content:center;background:var(--surface);}
  .login-logo{text-align:center;margin:60px 0 40px;}
  .logo-circle{width:76px;height:76px;border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:38px;}
  .login-logo h1{font-size:26px;font-weight:800;color:var(--t1);letter-spacing:-0.5px;}
  .login-logo p{font-size:14px;color:var(--t2);margin-top:4px;}
  .field-label{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:8px;display:block;}
  .pin-input{width:100%;padding:14px;font-size:28px;letter-spacing:14px;text-align:center;border:1.5px solid var(--border);border-radius:var(--r-md);background:var(--bg);color:var(--t1);margin-bottom:12px;outline:none;}
  .pin-input:focus{border-color:var(--green);}
  .btn-green{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--r-md);font-size:16px;font-weight:700;cursor:pointer;}
  .btn-green:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-outline{width:100%;padding:14px;background:none;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;font-weight:600;color:var(--t2);cursor:pointer;margin-top:10px;}
  .err{font-size:13px;color:var(--red-dark);text-align:center;margin-top:8px;min-height:20px;}
  .ok{font-size:13px;color:var(--green-dark);text-align:center;margin-top:8px;min-height:20px;}
  .ghost-link{display:block;text-align:center;margin-top:28px;background:none;border:none;font-size:13px;color:var(--t3);cursor:pointer;padding:4px;}
  #screen-change-pin{background:var(--surface);}
  .form-body{flex:1;padding:32px 24px 40px;display:flex;flex-direction:column;justify-content:center;}
  .form-body h2{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:6px;}
  .form-body p{font-size:14px;color:var(--t2);margin-bottom:28px;line-height:1.6;}
  .field-group{margin-bottom:16px;}
  #screen-practice{background:var(--bg);}
  .prac-header{background:var(--surface);padding:16px;border-bottom:1px solid var(--border);}
  .student-row-h{display:flex;align-items:center;gap:12px;}
  .avatar{border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--green-dark);flex-shrink:0;}
  .sname{font-size:16px;font-weight:700;color:var(--t1);}
  .sbadge{margin-left:auto;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:700;}
  .badge-idle{background:var(--bg);color:var(--t2);}
  .badge-on{background:var(--green-bg);color:var(--green-dark);}
  .card{background:var(--surface);margin:12px 16px;border-radius:var(--r-lg);border:1px solid var(--border);padding:20px 16px;}
  .timer-lbl{font-size:11px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;text-align:center;margin-bottom:10px;}
  .timer{font-size:58px;font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:-2px;text-align:center;transition:color .3s;}
  .timer.running{color:var(--green);}
  .big-btn{display:block;width:calc(100% - 32px);margin:0 16px;padding:16px;border:none;border-radius:var(--r-md);font-size:17px;font-weight:700;cursor:pointer;}
  .big-green{background:var(--green);color:#fff;}
  .big-pause{background:var(--surface);color:var(--red);border:2px solid var(--red);}
  .big-red{background:var(--red);color:#fff;}
  .big-btn:disabled{background:var(--bg);color:var(--t3);cursor:not-allowed;border:none;}
  .rec-head{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .rec-cnt{margin-left:auto;font-size:13px;font-weight:800;color:var(--t3);}
  .rec-cnt.done{color:var(--green);}
  .rec-btn{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--r-md);background:var(--bg);color:var(--t1);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .rec-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .rec-btn.recording{background:var(--red-bg);border-color:var(--red);color:var(--red-dark);}
  .rec-list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .rec-item{background:var(--green-bg);border-radius:var(--r-md);padding:12px;}
  .rec-item-top{font-size:14px;font-weight:700;color:var(--green-dark);margin-bottom:8px;}
  .rec-actions{display:flex;gap:8px;}
  .play-btn{flex:1;padding:9px 12px;background:#fff;border:1px solid #A8D9C8;border-radius:var(--r-sm);font-size:13px;font-weight:700;color:var(--green-dark);cursor:pointer;}
  .dl-btn{flex:1;padding:9px 12px;background:var(--green);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
  .dl-btn.dl-done{background:#888;cursor:default;}
  audio{width:100%;margin-top:8px;height:36px;}
  .mic-note{font-size:12px;color:var(--t3);text-align:center;padding:6px 16px 0;}
  .dl-warn{font-size:13px;color:var(--red-dark);background:var(--red-bg);border-radius:var(--r-md);padding:12px 14px;margin:10px 16px 0;text-align:center;display:none;font-weight:600;line-height:1.6;}
  #screen-instr-login{padding:0 24px 40px;justify-content:center;background:var(--surface);}
  #screen-instructor{background:var(--bg);}
  .tab-row{display:flex;gap:8px;padding:12px 16px 0;}
  .tab-btn{flex:1;padding:10px;border-radius:var(--r-md);font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--t2);}
  .tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
  .dash-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
  .d-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
  .d-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .d-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-box{background:var(--bg);border-radius:var(--r-md);padding:12px;}
  .stat-lbl{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:600;}
  .stat-val{font-size:20px;font-weight:800;color:var(--t1);}
  #screen-settings{background:var(--bg);}
  .set-card{background:var(--surface);margin:12px 16px;border-radius:var(--r-lg);border:1px solid var(--border);padding:16px;}
  .set-card h3{font-size:12px;font-weight:800;color:var(--t3);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px;}
  .s-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border-light);}
  .s-row:last-child{border-bottom:none;}
  .s-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .s-name{font-size:14px;font-weight:700;color:var(--t1);}
  .s-pin-inp{width:90px;padding:8px 10px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--t1);text-align:center;outline:none;}
  .s-save{padding:8px 12px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;}
  .s-del{background:none;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:7px 9px;cursor:pointer;font-size:16px;color:var(--red-dark);display:flex;align-items:center;}
  .add-form{margin-top:14px;border-top:1px solid var(--border-light);padding-top:14px;display:flex;flex-direction:column;gap:8px;}
  .add-lbl{font-size:12px;color:var(--t3);font-weight:600;}
  .add-row{display:flex;gap:8px;}
  .add-inp{flex:1;padding:10px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--t1);min-width:0;outline:none;}
  .add-inp:focus{border-color:var(--green);}
  .add-btn{padding:10px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .add-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .set-ok{font-size:13px;color:var(--green-dark);margin-top:8px;min-height:18px;font-weight:600;}
  .code-row{display:flex;gap:8px;align-items:center;}
  .code-inp{flex:1;padding:10px 12px;font-size:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--t1);letter-spacing:4px;text-align:center;outline:none;}
</style>
</head>
<body>
<div class="app">

<!-- 홈 -->
<div id="screen-login" class="screen active">
  <div class="login-logo">
    <div class="logo-circle" style="background:var(--green);">🎤</div>
    <h1>Studio MG</h1>
    <p>보컬 연습 트래커</p>
  </div>
  <label class="field-label">비밀번호</label>
  <input class="pin-input" type="password" maxlength="6" inputmode="numeric" id="student-pin" placeholder="••••" oninput="onStudentPin()"/>
  <button class="btn-green" id="student-login-btn" disabled onclick="studentLogin()">연습 시작하기</button>
  <button class="btn-outline" onclick="nav('screen-change-pin')">🔑 비밀번호 변경</button>
  <div class="err" id="student-err"></div>
  <button class="ghost-link" onclick="nav('screen-instr-login')">강사 모드 →</button>
</div>

<!-- 비밀번호 변경 -->
<div id="screen-change-pin" class="screen">
  <div class="top-bar">
    <button class="icon-btn" onclick="back()">◀</button>
    <h2>비밀번호 변경</h2>
  </div>
  <div class="form-body">
    <h2>내 비밀번호 변경</h2>
    <p>현재 비밀번호로 본인 확인 후<br>새 비밀번호를 설정해요.</p>
    <div class="field-group">
      <label class="field-label">현재 비밀번호</label>
      <input class="pin-input" type="password" maxlength="6" inputmode="numeric" id="cur-pin" placeholder="••••" oninput="onChangePinInput()"/>
    </div>
    <div class="field-group">
      <label class="field-label">새 비밀번호</label>
      <input class="pin-input" type="password" maxlength="6" inputmode="numeric" id="new-pin" placeholder="••••" oninput="onChangePinInput()"/>
    </div>
    <div class="field-group">
      <label class="field-label">새 비밀번호 확인</label>
      <input class="pin-input" type="password" maxlength="6" inputmode="numeric" id="new-pin2" placeholder="••••" oninput="onChangePinInput()"/>
    </div>
    <button class="btn-green" id="change-pin-btn" disabled onclick="submitChangePin()">변경하기</button>
    <div class="err" id="change-pin-err"></div>
    <div class="ok" id="change-pin-ok"></div>
  </div>
</div>

<!-- 연습 -->
<div id="screen-practice" class="screen">
  <div class="prac-header">
    <div class="student-row-h">
      <div class="avatar" id="prac-av" style="width:42px;height:42px;font-size:14px;">MG</div>
      <div><div class="sname" id="prac-name">이름</div></div>
      <span class="sbadge badge-idle" id="sbadge">대기 중</span>
    </div>
  </div>
  <div class="card">
    <div class="timer-lbl">연습 시간</div>
    <div class="timer" id="timer">00:00:00</div>
  </div>
  <button class="big-btn big-green" id="start-btn" onclick="togglePractice()">▶ 연습 시작</button>
  <div class="card" style="margin-top:12px;">
    <div class="rec-head">🎵 녹음 <span class="rec-cnt" id="rec-cnt">0 / 3</span></div>
    <button class="rec-btn" id="rec-btn" disabled onclick="toggleRecord()">🎙 <span id="rec-lbl">녹음 시작</span></button>
    <div class="rec-list" id="rec-list"></div>
  </div>
  <p class="mic-note" id="mic-note"></p>
  <div class="dl-warn" id="dl-warn"></div>
  <button class="big-btn big-red" id="end-btn" disabled onclick="endPractice()" style="margin-top:12px;margin-bottom:32px;">연습 종료</button>
</div>

<!-- 강사 로그인 -->
<div id="screen-instr-login" class="screen">
  <div style="text-align:center;margin:60px 0 40px;">
    <div class="logo-circle" style="background:var(--purple);margin:0 auto 14px;">🔒</div>
    <h1 style="font-size:24px;font-weight:800;color:var(--t1);">강사 모드</h1>
    <p style="font-size:14px;color:var(--t2);margin-top:4px;">강사 전용 코드를 입력하세요</p>
  </div>
  <div style="padding:0 24px;">
    <label class="field-label">강사 코드</label>
    <input class="pin-input" type="password" maxlength="6" inputmode="numeric" id="instr-pin" placeholder="••••••" oninput="onInstrPin()"/>
    <button class="btn-green" id="instr-login-btn" disabled onclick="instrLogin()">입장하기</button>
    <div class="err" id="instr-err"></div>
    <button class="ghost-link" onclick="back()">← 뒤로</button>
  </div>
</div>

<!-- 강사 대시보드 -->
<div id="screen-instructor" class="screen">
  <div class="top-bar">
    <button class="icon-btn" onclick="back()">◀</button>
    <h2>강사 대시보드</h2>
    <button class="icon-btn ml-auto" onclick="nav('screen-settings')">⚙️</button>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">오늘</button>
    <button class="tab-btn" id="tab-all" onclick="switchTab('all')">전체 기록</button>
  </div>
  <div class="dash-list" id="dash-list"></div>
</div>

<!-- 설정 -->
<div id="screen-settings" class="screen">
  <div class="top-bar">
    <button class="icon-btn" onclick="back()">◀</button>
    <h2>설정</h2>
  </div>
  <div class="set-card">
    <h3>학생 관리</h3>
    <div id="student-rows"></div>
    <div class="set-ok" id="student-ok"></div>
    <div class="add-form">
      <p class="add-lbl">새 학생 추가</p>
      <div class="add-row">
        <input class="add-inp" type="text" id="add-name" placeholder="이름 (예: 홍길동)" oninput="onAddInput()"/>
        <input class="add-inp" type="number" id="add-pin" placeholder="초기 비번" oninput="onAddInput()" style="max-width:130px;"/>
        <button class="add-btn" id="add-btn" disabled onclick="addStudent()">추가</button>
      </div>
      <div class="err" id="add-err" style="text-align:left;"></div>
    </div>
  </div>
  <div class="set-card">
    <h3>강사 코드 변경</h3>
    <div class="code-row">
      <input class="code-inp" type="password" maxlength="6" inputmode="numeric" id="new-instr-pin" placeholder="새 코드"/>
      <button class="s-save" onclick="saveInstrPin()">저장</button>
    </div>
    <div class="set-ok" id="instr-ok"></div>
  </div>
</div>

</div>
<script>
/* ── DB ── */
const SK='studiomg_v1';
function loadDB(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return{instrPin:'1234',students:{}};}
function saveDB(){try{localStorage.setItem(SK,JSON.stringify(DB));}catch(e){}}
const DB=loadDB();

/* ── 네비게이션 ── */
let stack=['screen-login'];
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function nav(id){show(id);stack.push(id);history.pushState({s:id},'');if(id==='screen-settings')renderStudentRows();}
function back(){if(stack.length>1)stack.pop();const p=stack[stack.length-1]||'screen-login';show(p);history.pushState({s:p},'');}
window.addEventListener('popstate',()=>{if(stack.length>1)stack.pop();show(stack[stack.length-1]||'screen-login');});
history.pushState({s:'screen-login'},'');

/* ── 상태 ── */
let cur=null,practicing=false,timerIv=null,secs=0,recCount=0;
// 녹음 관련 — mediaRec을 null로 초기화하지 않고 상태로만 관리
let isRecording=false;
let currentStream=null;
let currentMediaRec=null;
let currentChunks=[];
// blobs[i] = {blob, url, name, downloaded}
let blobs=[];

/* ── 홈 ── */
function onStudentPin(){document.getElementById('student-login-btn').disabled=!document.getElementById('student-pin').value.length;document.getElementById('student-err').textContent='';}
function studentLogin(){
  const pin=document.getElementById('student-pin').value;
  const found=Object.entries(DB.students).find(([,d])=>d.pin===pin);
  if(!found){document.getElementById('student-err').textContent='비밀번호가 맞지 않아요.';document.getElementById('student-pin').value='';document.getElementById('student-login-btn').disabled=true;return;}
  cur={name:found[0],...found[1]};
  initPractice();
  document.getElementById('student-pin').value='';
  document.getElementById('student-login-btn').disabled=true;
  nav('screen-practice');
}

/* ── 비번 변경 ── */
function onChangePinInput(){
  const a=document.getElementById('cur-pin').value,b=document.getElementById('new-pin').value,c=document.getElementById('new-pin2').value;
  document.getElementById('change-pin-btn').disabled=!(a&&b&&c);
  document.getElementById('change-pin-err').textContent='';document.getElementById('change-pin-ok').textContent='';
}
function submitChangePin(){
  const c=document.getElementById('cur-pin').value,n1=document.getElementById('new-pin').value,n2=document.getElementById('new-pin2').value;
  const found=Object.entries(DB.students).find(([,d])=>d.pin===c);
  if(!found){document.getElementById('change-pin-err').textContent='현재 비밀번호가 맞지 않아요.';return;}
  if(n1!==n2){document.getElementById('change-pin-err').textContent='새 비밀번호가 서로 달라요.';return;}
  if(n1===c){document.getElementById('change-pin-err').textContent='현재 비밀번호와 같은 번호예요.';return;}
  DB.students[found[0]].pin=n1;saveDB();
  ['cur-pin','new-pin','new-pin2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('change-pin-btn').disabled=true;
  document.getElementById('change-pin-ok').textContent='비밀번호가 변경됐어요 ✓';
  setTimeout(()=>back(),1500);
}

/* ── 연습 초기화 ── */
function initPractice(){
  secs=0;recCount=0;blobs=[];isRecording=false;
  if(timerIv)clearInterval(timerIv);
  if(currentStream)currentStream.getTracks().forEach(t=>t.stop());
  currentStream=null;currentMediaRec=null;currentChunks=[];
  document.getElementById('prac-av').textContent=cur.initials;
  document.getElementById('prac-name').textContent=cur.name;
  document.getElementById('timer').textContent='00:00:00';
  document.getElementById('timer').classList.remove('running');
  document.getElementById('rec-cnt').textContent='0 / 3';
  document.getElementById('rec-cnt').classList.remove('done');
  document.getElementById('rec-list').innerHTML='';
  document.getElementById('rec-btn').disabled=true;
  document.getElementById('rec-btn').className='rec-btn';
  document.getElementById('end-btn').disabled=true;
  document.getElementById('start-btn').className='big-btn big-green';
  document.getElementById('start-btn').textContent='▶ 연습 시작';
  document.getElementById('sbadge').textContent='대기 중';
  document.getElementById('sbadge').className='sbadge badge-idle';
  document.getElementById('rec-lbl').textContent='녹음 시작';
  document.getElementById('mic-note').textContent='';
  document.getElementById('dl-warn').style.display='none';
  practicing=false;
}

/* ── 시작/일시정지 ── */
function togglePractice(){
  if(!practicing){
    practicing=true;
    timerIv=setInterval(()=>{
      secs++;
      document.getElementById('timer').textContent=
        String(Math.floor(secs/3600)).padStart(2,'0')+':'+
        String(Math.floor((secs%3600)/60)).padStart(2,'0')+':'+
        String(secs%60).padStart(2,'0');
    },1000);
    document.getElementById('timer').classList.add('running');
    document.getElementById('sbadge').textContent='연습 중';
    document.getElementById('sbadge').className='sbadge badge-on';
    document.getElementById('start-btn').className='big-btn big-pause';
    document.getElementById('start-btn').textContent='⏸ 일시정지';
    if(recCount<3)document.getElementById('rec-btn').disabled=false;
  }else{
    practicing=false;clearInterval(timerIv);
    document.getElementById('timer').classList.remove('running');
    document.getElementById('sbadge').textContent='일시정지';
    document.getElementById('sbadge').className='sbadge badge-idle';
    document.getElementById('start-btn').className='big-btn big-green';
    document.getElementById('start-btn').textContent='▶ 다시 시작';
    document.getElementById('rec-btn').disabled=true;
  }
}

/* ── 녹음 시작 ── */
async function startRecording(){
  try{
    currentChunks=[];
    currentStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    let mime='';
    const candidates=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
    for(const m of candidates){if(MediaRecorder.isTypeSupported(m)){mime=m;break;}}
    currentMediaRec=mime?new MediaRecorder(currentStream,{mimeType:mime}):new MediaRecorder(currentStream);
    currentMediaRec.ondataavailable=e=>{
      if(e.data&&e.data.size>0)currentChunks.push(e.data);
    };
    // onstop은 stopRecording()에서 등록
    currentMediaRec.start(100);
    isRecording=true;
    document.getElementById('rec-btn').className='rec-btn recording';
    document.getElementById('rec-lbl').textContent='녹음 중 ● (완료하려면 다시 누르기)';
    document.getElementById('mic-note').textContent='🎙 마이크가 활성화되어 있어요';
  }catch(e){
    document.getElementById('mic-note').textContent='마이크 권한이 필요해요. 브라우저에서 허용해주세요.';
  }
}

/* ── 녹음 중지 ── */
function stopRecording(){
  if(!currentMediaRec||currentMediaRec.state==='inactive')return;
  recCount++;
  const numForClosure=recCount; // 클로저용 스냅샷
  const recForClosure=currentMediaRec;
  const chunksForClosure=currentChunks;
  const streamForClosure=currentStream;

  recForClosure.onstop=function(){
    // 스트림 정리
    streamForClosure.getTracks().forEach(t=>t.stop());
    // Blob 생성
    const usedMime=recForClosure.mimeType||'audio/webm';
    const blob=new Blob(chunksForClosure,{type:usedMime});
    const url=URL.createObjectURL(blob);
    let ext='webm';
    if(usedMime.includes('mp4'))ext='mp4';
    else if(usedMime.includes('ogg'))ext='ogg';
    const today=new Date().toISOString().slice(0,10);
    const fname=`${cur.name}_연습녹음${numForClosure}_${today}.${ext}`;
    const idx=blobs.length;
    blobs.push({blob,url,name:fname,downloaded:false});
    // UI 추가
    addRecItem(numForClosure,url,fname,idx);
    document.getElementById('mic-note').textContent='';
  };

  recForClosure.stop();

  // 상태 초기화 (onstop 실행 전에 null 해도 괜찮음 — 클로저가 참조 유지)
  currentMediaRec=null;
  currentStream=null;
  currentChunks=[];
  isRecording=false;

  // UI 업데이트
  document.getElementById('rec-btn').className='rec-btn';
  document.getElementById('rec-lbl').textContent=numForClosure>=3?'녹음 완료 ✓':'녹음 시작';
  const cnt=document.getElementById('rec-cnt');
  cnt.textContent=`${numForClosure} / 3`;
  if(numForClosure>=3){
    cnt.classList.add('done');
    document.getElementById('rec-btn').disabled=true;
    document.getElementById('end-btn').disabled=false;
  }
}

function toggleRecord(){
  if(!isRecording){
    startRecording();
  }else{
    stopRecording();
  }
}

/* ── 녹음 아이템 UI ── */
function addRecItem(num,url,fname,idx){
  const li=document.createElement('div');li.className='rec-item';
  li.innerHTML=`
    <div class="rec-item-top">✅ 연습 녹음 ${num}</div>
    <div class="rec-actions">
      <button class="play-btn" id="pb-${num}" onclick="togglePlay(${num})">▶ 재생</button>
      <button class="dl-btn" id="db-${num}" onclick="doDownload(${idx},${num})">⬇ 다운로드</button>
    </div>
    <audio id="au-${num}" src="${url}" onended="resetPb(${num})"></audio>`;
  document.getElementById('rec-list').appendChild(li);
}

function togglePlay(n){
  const au=document.getElementById('au-'+n),pb=document.getElementById('pb-'+n);
  if(au.paused){
    document.querySelectorAll('audio').forEach(a=>{a.pause();a.currentTime=0;});
    document.querySelectorAll('[id^="pb-"]').forEach(b=>b.textContent='▶ 재생');
    au.play();pb.textContent='⏸ 정지';
  }else{au.pause();au.currentTime=0;pb.textContent='▶ 재생';}
}
function resetPb(n){const b=document.getElementById('pb-'+n);if(b)b.textContent='▶ 재생';}

/* ── 다운로드 ── */
function doDownload(idx,num){
  const rec=blobs[idx];
  if(!rec){alert('파일이 아직 준비되지 않았어요. 잠시 후 다시 눌러주세요.');return;}
  // ObjectURL 직접 사용 (크롬에서 가장 안정적)
  const a=document.createElement('a');
  a.href=rec.url;
  a.download=rec.name;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{
    document.body.removeChild(a);
  },500);
  rec.downloaded=true;
  const db=document.getElementById('db-'+num);
  if(db){db.textContent='✓ 완료';db.classList.add('dl-done');db.disabled=true;}
  if(blobs.length===3&&blobs.every(r=>r.downloaded)){
    document.getElementById('dl-warn').style.display='none';
  }
}

/* ── 연습 종료 ── */
function endPractice(){
  if(recCount<3){showWarn('녹음을 3회 완료해야 종료할 수 있어요!');return;}
  if(blobs.length<3){showWarn('녹음 파일이 아직 처리 중이에요. 잠시 후 다시 눌러주세요.');return;}
  const notDl=blobs.filter(r=>!r.downloaded);
  if(notDl.length>0){showWarn(`⚠️ 녹음 파일 ${notDl.length}개를 아직 다운로드하지 않았어요.\n⬇ 다운로드 버튼을 눌러 저장 후 종료해주세요!`);return;}
  clearInterval(timerIv);
  const h=String(Math.floor(secs/3600)).padStart(2,'0');
  const m=String(Math.floor((secs%3600)/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  const duration=`${h}:${m}:${s}`;
  const today=new Date().toISOString().slice(0,10);
  if(DB.students[cur.name]){DB.students[cur.name].sessions.unshift({date:today,duration,recs:recCount});saveDB();}
  stack=['screen-login'];show('screen-login');history.pushState({s:'screen-login'},'');
}
function showWarn(msg){const w=document.getElementById('dl-warn');w.style.display='block';w.textContent=msg;w.scrollIntoView({behavior:'smooth',block:'center'});}

/* ── 강사 로그인 ── */
function onInstrPin(){document.getElementById('instr-login-btn').disabled=!document.getElementById('instr-pin').value.length;document.getElementById('instr-err').textContent='';}
function instrLogin(){
  const pin=document.getElementById('instr-pin').value;
  if(pin!==DB.instrPin){document.getElementById('instr-err').textContent='코드가 맞지 않아요.';document.getElementById('instr-pin').value='';document.getElementById('instr-login-btn').disabled=true;return;}
  document.getElementById('instr-pin').value='';document.getElementById('instr-login-btn').disabled=true;
  renderDash('today');nav('screen-instructor');
}

/* ── 대시보드 ── */
function switchTab(t){
  document.getElementById('tab-today').className='tab-btn'+(t==='today'?' active':'');
  document.getElementById('tab-all').className='tab-btn'+(t==='all'?' active':'');
  renderDash(t);
}
function renderDash(tab){
  const today=new Date().toISOString().slice(0,10);
  const list=document.getElementById('dash-list');list.innerHTML='';
  const entries=Object.entries(DB.students);
  if(!entries.length){list.innerHTML='<div style="padding:32px 0;text-align:center;font-size:14px;color:var(--t3);">등록된 학생이 없어요<br><small>설정에서 학생을 추가해주세요</small></div>';return;}
  entries.forEach(([name,data])=>{
    const sessions=tab==='today'?data.sessions.filter(s=>s.date===today):data.sessions;
    if(!sessions.length){
      const c=document.createElement('div');c.className='d-card';
      c.innerHTML=`<div class="d-head"><div class="avatar" style="width:36px;height:36px;font-size:12px;">${data.initials}</div><div><div class="sname">${name}</div></div></div><p style="font-size:13px;color:var(--t3);">${tab==='today'?'오늘 연습 기록 없음':'기록 없음'}</p>`;
      list.appendChild(c);return;
    }
    sessions.forEach(sess=>{
      const c=document.createElement('div');c.className='d-card';
      c.innerHTML=`<div class="d-head"><div class="avatar" style="width:36px;height:36px;font-size:12px;">${data.initials}</div><div><div class="sname">${name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px;">${sess.date}</div></div></div><div class="d-stats"><div class="stat-box"><div class="stat-lbl">연습 시간</div><div class="stat-val">${sess.duration}</div></div><div class="stat-box"><div class="stat-lbl">녹음</div><div class="stat-val">${sess.recs}회</div></div></div>`;
      list.appendChild(c);
    });
  });
}

/* ── 설정 ── */
function getInitials(name){return name.length>=3?name.slice(1):name.slice(-2);}
function renderStudentRows(){
  const c=document.getElementById('student-rows');c.innerHTML='';
  const entries=Object.entries(DB.students);
  if(!entries.length){c.innerHTML='<p style="font-size:13px;color:var(--t3);padding:4px 0 10px;">등록된 학생 없음</p>';return;}
  entries.forEach(([name,data])=>{
    const row=document.createElement('div');row.className='s-row';
    row.innerHTML=`<div class="s-info"><div class="avatar" style="width:32px;height:32px;font-size:11px;">${data.initials}</div><div class="s-name">${name}</div></div><input class="s-pin-inp" type="number" placeholder="새 PIN" id="rpin-${name}"/><button class="s-save" onclick="saveStudentPin('${name}')">저장</button><button class="s-del" onclick="delStudent('${name}')">🗑</button>`;
    c.appendChild(row);
  });
}
function saveStudentPin(name){
  const inp=document.getElementById('rpin-'+name);const v=inp.value.trim();if(!v)return;
  DB.students[name].pin=v;saveDB();inp.value='';
  showOk('student-ok',`${name} 비밀번호 초기화됨 ✓`);
}
function delStudent(name){
  if(!confirm(`${name} 학생을 삭제할까요?\n연습 기록도 모두 사라져요.`))return;
  delete DB.students[name];saveDB();renderStudentRows();
  showOk('student-ok',`${name} 삭제됨`);
}
function onAddInput(){
  document.getElementById('add-btn').disabled=!(document.getElementById('add-name').value.trim()&&document.getElementById('add-pin').value.trim());
  document.getElementById('add-err').textContent='';
}
function addStudent(){
  const name=document.getElementById('add-name').value.trim(),pin=document.getElementById('add-pin').value.trim();
  if(DB.students[name]){document.getElementById('add-err').textContent='이미 같은 이름의 학생이 있어요.';return;}
  DB.students[name]={initials:getInitials(name),pin,sessions:[]};saveDB();
  document.getElementById('add-name').value='';document.getElementById('add-pin').value='';document.getElementById('add-btn').disabled=true;
  renderStudentRows();showOk('student-ok',`${name} 추가됨 ✓`);
}
function saveInstrPin(){
  const v=document.getElementById('new-instr-pin').value.trim();if(!v)return;
  DB.instrPin=v;saveDB();document.getElementById('new-instr-pin').value='';
  showOk('instr-ok','강사 코드 저장됨 ✓');
}
function showOk(id,msg){const el=document.getElementById(id);el.textContent=msg;setTimeout(()=>el.textContent='',2500);}
</script>
